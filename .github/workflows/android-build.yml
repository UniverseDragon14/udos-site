name: Build UDOS Android

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install website dependencies
        run: npm install

      - name: Install Capacitor 7
        run: npm install @capacitor/core@7 @capacitor/cli@7 @capacitor/android@7

      - name: Prepare static web assets
        run: |
          rm -rf www
          mkdir -p www
          cp index.html www/index.html

      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.universaldragon.udos",
            "appName": "Universal Dragon OS",
            "webDir": "www"
          }
          EOF

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: udos-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
